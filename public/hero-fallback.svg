<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Maverich call sign — stylized M against warm sunrise altitude">
  <defs>
    <radialGradient id="warm-haze" cx="50%" cy="20%" r="70%">
      <stop offset="0%" stop-color="#5C3920" stop-opacity="0.55"/>
      <stop offset="40%" stop-color="#3D2818" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#0A0A0B" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cool-edge-left" cx="0%" cy="100%" r="60%">
      <stop offset="0%" stop-color="#243A55" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#0A0A0B" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cool-edge-right" cx="100%" cy="100%" r="60%">
      <stop offset="0%" stop-color="#243A55" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#0A0A0B" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="amber-spot" cx="50%" cy="55%" r="22%">
      <stop offset="0%" stop-color="#E8B547" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0A0A0B" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="m-fill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F5F2EC"/>
      <stop offset="100%" stop-color="#A09C95"/>
    </linearGradient>
  </defs>

  <!-- Deep void backdrop -->
  <rect width="1600" height="900" fill="#0A0A0B"/>

  <!-- Atmospheric layers -->
  <rect width="1600" height="900" fill="url(#warm-haze)"/>
  <rect width="1600" height="900" fill="url(#cool-edge-left)"/>
  <rect width="1600" height="900" fill="url(#cool-edge-right)"/>
  <rect width="1600" height="900" fill="url(#amber-spot)"/>

  <!-- Scattered stars -->
  <g fill="#F5F2EC" opacity="0.6">
    <circle cx="120" cy="160" r="0.8"/>
    <circle cx="280" cy="90" r="1.1"/>
    <circle cx="440" cy="220" r="0.6"/>
    <circle cx="610" cy="130" r="0.9"/>
    <circle cx="780" cy="60" r="1.2"/>
    <circle cx="950" cy="170" r="0.7"/>
    <circle cx="1130" cy="110" r="1.0"/>
    <circle cx="1290" cy="200" r="0.8"/>
    <circle cx="1430" cy="80" r="1.1"/>
    <circle cx="1540" cy="190" r="0.7"/>
    <circle cx="200" cy="320" r="0.6"/>
    <circle cx="520" cy="380" r="0.9"/>
    <circle cx="880" cy="290" r="0.7"/>
    <circle cx="1240" cy="350" r="0.8"/>
    <circle cx="1480" cy="400" r="0.6"/>
    <circle cx="80" cy="470" r="0.7"/>
    <circle cx="360" cy="520" r="0.9"/>
    <circle cx="700" cy="500" r="0.6"/>
    <circle cx="1080" cy="540" r="0.8"/>
    <circle cx="1380" cy="470" r="0.7"/>
  </g>

  <!-- Stenciled M call-sign — squadron mark -->
  <g transform="translate(800 470)" fill="url(#m-fill)" stroke="#E8B547" stroke-width="2" stroke-opacity="0.4">
    <path d="M -150 120 L -150 -120 L -90 -120 L 0 30 L 90 -120 L 150 -120 L 150 120 L 100 120 L 100 -40 L 25 90 L -25 90 L -100 -40 L -100 120 Z"/>
  </g>

  <!-- Mono micro-tag -->
  <text x="800" y="640" text-anchor="middle" fill="#A09C95" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="14" letter-spacing="3">
    [ CALL SIGN: MAVERICH \\ V1.0 ]
  </text>

  <!-- Distant horizon hairline -->
  <line x1="0" y1="780" x2="1600" y2="780" stroke="#F5C97D" stroke-opacity="0.18" stroke-width="1"/>
</svg>
